<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오늘 뭐 먹지?</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#38bdf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="오늘 뭐 먹지?">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --sky: #38bdf8; --sky-dark: #0ea5e9; --sky-deeper: #0284c7;
    --sky-light: #f0f9ff; --sky-border: #bae6fd; --sky-hover: #e0f2fe;
    --text: #1e293b; --sub: #64748b; --bg: #f0f6fb; --card: #fff; --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* HEADER */
  header { background: linear-gradient(135deg,var(--sky),var(--sky-dark)); color: #fff; padding: 13px 18px; padding-top: calc(13px + env(safe-area-inset-top)); display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(14,165,233,.3); position: sticky; top:0; z-index:50; }
  header h1 { font-size:19px; font-weight:800; letter-spacing:-.3px; }

  /* LAYOUT */
  .wrap { display:flex; gap:14px; padding:14px; max-width:1200px; margin:0 auto; }
  .left  { flex: 0 0 350px; }
  .right { flex:1; min-width:0; display:flex; flex-direction:column; }

  /* CARD */
  .card { background:var(--card); border-radius:18px; padding:16px; box-shadow:0 2px 16px rgba(0,0,0,.07); margin-bottom:12px; }
  .card-title { font-size:15px; font-weight:800; margin-bottom:2px; }
  .card-sub   { font-size:12px; color:var(--sub); margin-bottom:12px; }

  /* CALENDAR */
  .cal-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-hd h2 { font-size:16px; font-weight:800; }
  .cal-nav { background:var(--sky-light); border:none; font-size:14px; cursor:pointer; color:var(--sky-dark); padding:7px 12px; border-radius:10px; transition:.15s; }
  .cal-nav:hover { background:var(--sky-border); }
  .cal-days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
  .dl { text-align:center; font-size:11px; font-weight:700; color:#94a3b8; padding:4px 0; }
  .dl:first-child { color:#f87171; } .dl:last-child { color:var(--sky-dark); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cc { aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-size:14px; font-weight:500; transition:.15s; position:relative; border:2px solid transparent; user-select:none; }
  .cc:active { transform:scale(.9); }
  .cc:hover { background:var(--sky-hover); }
  .cc.empty { cursor:default; } .cc.empty:hover { background:none; transform:none; }
  .cc.today { background:var(--sky); color:#fff; font-weight:800; } .cc.today:hover { background:var(--sky-dark); }
  .cc.sel:not(.today) { border-color:var(--sky); background:var(--sky-light); }
  .cc.has-meal { border-color:var(--sky); }
  .cc.sun { color:#f87171; } .cc.sat { color:var(--sky-dark); }
  .cc.today.sun,.cc.today.sat { color:#fff; }
  .mdots { display:flex; gap:2px; margin-top:2px; }
  .md { width:4px; height:4px; border-radius:50%; }
  .md-b { background:#fbbf24; } .md-l { background:#34d399; } .md-d { background:#f472b6; }

  /* DAY PANEL */
  .dp { margin-top:12px; background:var(--sky-light); border-radius:14px; padding:14px; border:1.5px solid var(--sky-border); }
  .dp-title { font-size:13px; font-weight:800; color:var(--sky-dark); margin-bottom:12px; }
  .mb { margin-bottom:11px; }
  .mh { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .mn { font-size:12px; font-weight:700; color:var(--sub); white-space:nowrap; min-width:50px; }
  .toggle { display:flex; background:#e2e8f0; border-radius:8px; padding:2px; gap:2px; }
  .tb { border:none; background:none; border-radius:6px; padding:4px 9px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; color:#64748b; transition:.15s; white-space:nowrap; }
  .tb.on { background:#fff; color:var(--sky-dark); box-shadow:0 1px 4px rgba(0,0,0,.12); }
  .mir { display:flex; gap:6px; align-items:center; }
  .mi { flex:1; border:1.5px solid var(--border); border-radius:10px; padding:9px 11px; font-size:14px; font-family:inherit; outline:none; background:#fff; color:var(--text); min-width:0; transition:.2s; }
  .mi::placeholder { color:#94a3b8; font-size:12px; }
  .mi:focus { border-color:var(--sky); box-shadow:0 0 0 3px rgba(56,189,248,.15); }
  .ur { display:flex; gap:6px; align-items:center; margin-top:5px; }
  .ui { flex:1; border:1.5px solid var(--border); border-radius:10px; padding:8px 11px; font-size:12px; font-family:inherit; outline:none; background:#fff; color:var(--text); min-width:0; transition:.2s; }
  .ui::placeholder { color:#94a3b8; }
  .ui:focus { border-color:var(--sky); box-shadow:0 0 0 3px rgba(56,189,248,.15); }
  .ib { background:var(--sky-light); border:1.5px solid var(--sky-border); border-radius:10px; padding:8px 10px; cursor:pointer; font-size:14px; color:var(--sky-dark); transition:.15s; flex-shrink:0; display:flex; align-items:center; justify-content:center; text-decoration:none; line-height:1; }
  .ib:hover { background:var(--sky-border); }
  .map-btns { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
  .mapb { background:#f1f5f9; border:none; border-radius:8px; padding:5px 10px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; color:#475569; transition:.15s; }
  .mapb:hover { background:#e2e8f0; }
  .save-btn { width:100%; margin-top:6px; background:linear-gradient(135deg,var(--sky),var(--sky-dark)); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 4px 12px rgba(14,165,233,.3); transition:.15s; }
  .save-btn:active { transform:scale(.98); }
  /* 링크 토글 버튼 */
  .url-toggle-btn { background:none; border:none; color:var(--sky-dark); font-size:12px; font-weight:600; cursor:pointer; padding:4px 0 0; font-family:inherit; display:inline-flex; align-items:center; gap:3px; opacity:.8; }
  .url-toggle-btn:hover { opacity:1; text-decoration:underline; }

  /* SEARCH */
  .search-row { display:flex; gap:8px; margin-bottom:12px; }
  .search-in { flex:1; border:1.5px solid var(--border); border-radius:12px; padding:11px 14px; font-size:14px; font-family:inherit; outline:none; background:#f8fafc; color:var(--text); transition:.2s; min-width:0; }
  .search-in:focus { border-color:var(--sky); background:#fff; box-shadow:0 0 0 3px rgba(56,189,248,.15); }
  .search-in::placeholder { color:#94a3b8; }
  .search-go { background:linear-gradient(135deg,var(--sky),var(--sky-dark)); color:#fff; border:none; border-radius:12px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0; transition:opacity .15s; }
  .search-go:hover { opacity:.9; }

  /* RESULTS */
  .results-header { font-size:12px; font-weight:700; color:var(--sub); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .results-list { display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
  .result-item { display:flex; align-items:center; gap:10px; background:#f8fafc; border:1.5px solid var(--border); border-radius:12px; padding:11px 12px; transition:.15s; }
  .result-item:hover { border-color:var(--sky); background:var(--sky-light); }
  .ri-icon { font-size:20px; flex-shrink:0; width:28px; text-align:center; }
  .ri-info { flex:1; min-width:0; }
  .ri-name { font-size:13px; font-weight:700; color:var(--text); }
  .ri-url  { font-size:11px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .ri-btns { display:flex; gap:5px; flex-shrink:0; }
  .ri-open { background:var(--sky); color:#fff; border:none; border-radius:8px; padding:6px 11px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; transition:.15s; white-space:nowrap; }
  .ri-open:hover { background:var(--sky-dark); }
  .ri-save { background:#f1f5f9; color:#475569; border:1.5px solid var(--border); border-radius:8px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; white-space:nowrap; }
  .ri-save:hover { border-color:var(--sky); color:var(--sky-dark); background:var(--sky-light); }

  /* PASTE SAVE */
  .paste-section { border-top:1px solid var(--border); padding-top:12px; margin-top:4px; }
  .paste-label { font-size:12px; font-weight:700; color:var(--sub); margin-bottom:7px; }
  .paste-row { display:flex; gap:6px; }
  .paste-in { flex:1; border:1.5px solid var(--border); border-radius:10px; padding:9px 12px; font-size:13px; font-family:inherit; outline:none; background:#f8fafc; color:var(--text); min-width:0; transition:.2s; }
  .paste-in::placeholder { color:#94a3b8; font-size:12px; }
  .paste-in:focus { border-color:var(--sky); background:#fff; box-shadow:0 0 0 3px rgba(56,189,248,.15); }
  .paste-btn { background:var(--sky-light); border:1.5px solid var(--sky-border); border-radius:10px; padding:9px 14px; font-size:13px; font-weight:700; color:var(--sky-dark); cursor:pointer; font-family:inherit; flex-shrink:0; transition:.15s; }
  .paste-btn:hover { background:var(--sky-border); }
  .paste-name { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:8px 12px; font-size:12px; font-family:inherit; outline:none; background:#f8fafc; color:var(--text); transition:.2s; margin-top:5px; display:block; }
  .paste-name::placeholder { color:#94a3b8; }
  .paste-name:focus { border-color:var(--sky); background:#fff; box-shadow:0 0 0 3px rgba(56,189,248,.15); }

  /* FAVORITES */
  .saved-empty { text-align:center; color:#94a3b8; font-size:13px; padding:20px 0; }
  .saved-list { display:flex; flex-direction:column; gap:8px; }
  .sl-item { display:flex; gap:10px; align-items:flex-start; background:#f8fafc; border:1.5px solid var(--border); border-radius:12px; padding:11px 12px; }
  .sl-thumb { width:64px; height:48px; border-radius:8px; flex-shrink:0; background:#e2e8f0; display:flex; align-items:center; justify-content:center; font-size:22px; overflow:hidden; }
  .sl-thumb img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
  .sl-info { flex:1; min-width:0; }
  .sl-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sl-url   { font-size:11px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
  .sl-meta  { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
  .pl-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; }
  .pl-youtube   { background:#fee2e2; color:#991b1b; }
  .pl-naver     { background:#dcfce7; color:#14532d; }
  .pl-instagram { background:#fce7f3; color:#831843; }
  .pl-tiktok    { background:#f0fdf4; color:#065f46; }
  .pl-recipe    { background:#fff7ed; color:#9a3412; }
  .pl-web       { background:#f1f5f9; color:#475569; }
  .sl-date { font-size:10px; color:#94a3b8; }
  .sl-btns { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
  .sl-open { background:var(--sky); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; display:block; text-align:center; transition:.15s; }
  .sl-open:hover { background:var(--sky-dark); }
  .sl-add { background:#f0fdf4; color:#065f46; border:1.5px solid #bbf7d0; border-radius:8px; padding:5px 8px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; white-space:nowrap; }
  .sl-add:hover { background:#dcfce7; }
  .sl-del { background:#fff1f2; color:#be123c; border:1.5px solid #fecdd3; border-radius:8px; padding:5px 8px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; }
  .sl-del:hover { background:#ffe4e6; }

  /* FAVORITES TABS */
  .fav-tabs { display:flex; gap:6px; margin-bottom:12px; }
  .fav-tab { flex:1; border:1.5px solid var(--border); background:#f8fafc; border-radius:10px; padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:#64748b; transition:.15s; }
  .fav-tab.on { background:var(--sky); color:#fff; border-color:var(--sky-dark); }
  .fav-tab:hover:not(.on) { background:var(--sky-light); border-color:var(--sky-border); }

  /* PASTE GROUP */
  .paste-group { display:flex; gap:6px; margin-top:7px; }
  .pg-btn { flex:1; border:1.5px solid var(--border); background:#f8fafc; border-radius:9px; padding:7px 10px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; color:#64748b; transition:.15s; }
  .pg-btn.on { background:var(--sky-light); color:var(--sky-dark); border-color:var(--sky-border); }
  .pg-btn:hover:not(.on) { background:#e2e8f0; }

  /* RECIPE CARDS */
  .rec-hd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:10px; }
  .shuffle-btn { background:var(--sky-light); border:1.5px solid var(--sky-border); border-radius:10px; padding:7px 13px; font-size:12px; font-weight:700; color:var(--sky-dark); cursor:pointer; font-family:inherit; transition:.15s; flex-shrink:0; white-space:nowrap; }
  .shuffle-btn:hover { background:var(--sky-border); }
  .rec-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1.5px solid var(--border); border-radius:12px; margin-bottom:6px; transition:.15s; background:#fff; }
  .rec-item:hover { border-color:var(--sky); background:var(--sky-light); }
  .rec-item:last-child { margin-bottom:0; }
  .rec-emoji { font-size:20px; flex-shrink:0; width:26px; text-align:center; }
  .rec-info { flex:1; min-width:0; }
  .rec-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rec-cat-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; background:#f1f5f9; color:#475569; margin-top:2px; display:inline-block; }
  .rec-actions { display:flex; gap:5px; flex-shrink:0; }
  .rec-open { background:var(--sky); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; transition:.15s; white-space:nowrap; }
  .rec-open:hover { background:var(--sky-dark); }
  .rec-add { background:#f0fdf4; color:#065f46; border:1.5px solid #bbf7d0; border-radius:8px; padding:6px 8px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; white-space:nowrap; }
  .rec-add:hover { background:#dcfce7; }

  /* SYNC STATUS */
  .sync-wrap { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .sync-txt { font-size:11px; opacity:.85; color:#fff; }
  .sync-btn { background:rgba(255,255,255,.18); border:none; border-radius:8px; padding:5px 10px; font-size:13px; color:#fff; cursor:pointer; transition:.15s; }
  .sync-btn:hover { background:rgba(255,255,255,.3); }

  /* TOAST */
  .toast { position:fixed; bottom:calc(28px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(80px); background:#1e293b; color:#fff; padding:10px 20px; border-radius:30px; font-size:13px; font-weight:500; transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:200; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.2); }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* DESKTOP card order: search → fav → recs */
  @media(min-width:769px){
    .card-search { order:1; }
    .card-fav    { order:2; }
    .card-recs   { order:3; }
  }

  /* MOBILE */
  @media(max-width:768px){
    .wrap { flex-direction:column; padding:10px; gap:10px; }
    .left { flex:none; }
    .card { padding:13px 12px; border-radius:16px; margin-bottom:10px; }
    .mn { min-width:46px; }
    .ri-url { display:none; }
    /* mobile card order: recs → search → fav */
    .card-recs   { order:1; }
    .card-search { order:2; }
    .card-fav    { order:3; }
  }
</style>
</head>
<body>
<header>
  <span style="font-size:22px">🍽️</span>
  <h1>오늘 뭐 먹지?</h1>
  <div class="sync-wrap">
    <span class="sync-txt" id="sync-status"></span>
    <button class="sync-btn" onclick="loadFromSheet()" title="최신 데이터 불러오기">🔄</button>
  </div>
</header>

<div class="wrap">
<!-- ══ LEFT ══ -->
<div class="left">
  <div class="card">
    <div class="cal-hd">
      <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-days">
      <div class="dl">일</div><div class="dl">월</div><div class="dl">화</div>
      <div class="dl">수</div><div class="dl">목</div><div class="dl">금</div><div class="dl">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>

    <!-- Day Panel -->
    <div class="dp" id="dp" style="display:none">
      <div class="dp-title" id="dp-title"></div>

      <!-- 아침 -->
      <div class="mb" id="blk-breakfast">
        <div class="mh">
          <span class="mn">🌅&nbsp;아침</span>
          <div class="toggle">
            <button class="tb on" onclick="setType('breakfast','home',this)">집밥</button>
            <button class="tb"    onclick="setType('breakfast','out',this)">외식</button>
          </div>
        </div>
        <div id="home-breakfast">
          <div class="mir">
            <input class="mi" id="txt-breakfast" placeholder="먹은 것 입력…">
            <button class="ib" onclick="qs('breakfast')" title="레시피 검색">🔍</button>
          </div>
          <button class="url-toggle-btn" id="home-url-toggle-breakfast" onclick="toggleHomeUrl('breakfast')">🔗 링크 추가</button>
          <div class="ur" id="home-url-row-breakfast" style="display:none">
            <input class="ui" id="home-url-breakfast" placeholder="레시피 링크 붙여넣기…" oninput="updHomeOpen('breakfast',this.value)">
            <a class="ib" id="home-opn-breakfast" href="#" target="_blank" style="opacity:.4;pointer-events:none">↗</a>
          </div>
        </div>
        <div id="out-breakfast" style="display:none">
          <div class="mir"><input class="mi" id="pl-breakfast" placeholder="음식점 이름"></div>
          <div class="ur">
            <input class="ui" id="url-breakfast" placeholder="링크 붙여넣기…" oninput="updOpen('breakfast',this.value)">
            <a class="ib" id="opn-breakfast" href="#" target="_blank" style="opacity:.4;pointer-events:none">↗</a>
          </div>
          <div class="map-btns">
            <button class="mapb" onclick="smap('breakfast','naver')">🗺 네이버지도</button>
            <button class="mapb" onclick="smap('breakfast','kakao')">🟡 카카오맵</button>
            <button class="mapb" onclick="smap('breakfast','google')">📍 구글</button>
          </div>
        </div>
      </div>

      <!-- 점심 -->
      <div class="mb" id="blk-lunch">
        <div class="mh">
          <span class="mn">☀️&nbsp;점심</span>
          <div class="toggle">
            <button class="tb on" onclick="setType('lunch','home',this)">집밥</button>
            <button class="tb"    onclick="setType('lunch','out',this)">외식</button>
          </div>
        </div>
        <div id="home-lunch">
          <div class="mir">
            <input class="mi" id="txt-lunch" placeholder="먹은 것 입력…">
            <button class="ib" onclick="qs('lunch')" title="레시피 검색">🔍</button>
          </div>
          <button class="url-toggle-btn" id="home-url-toggle-lunch" onclick="toggleHomeUrl('lunch')">🔗 링크 추가</button>
          <div class="ur" id="home-url-row-lunch" style="display:none">
            <input class="ui" id="home-url-lunch" placeholder="레시피 링크 붙여넣기…" oninput="updHomeOpen('lunch',this.value)">
            <a class="ib" id="home-opn-lunch" href="#" target="_blank" style="opacity:.4;pointer-events:none">↗</a>
          </div>
        </div>
        <div id="out-lunch" style="display:none">
          <div class="mir"><input class="mi" id="pl-lunch" placeholder="음식점 이름"></div>

function setSyncStatus(msg, type) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === 'ok' ? '#a7f3d0' : type === 'err' ? '#fca5a5' : '#e0f2fe';
}

let syncDebounce = null;
function syncToSheet() {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_SCRIPT_URL') return;
  clearTimeout(syncDebounce);
  syncDebounce = setTimeout(() => {
    setSyncStatus('동기화 중…', 'ing');
    const fd = new FormData();
    fd.append('data', JSON.stringify({meals, favorites}));
    fetch(SCRIPT_URL, {method:'POST', body:fd, mode:'no-cors'})
      .then(() => setSyncStatus('✓ 동기화됨', 'ok'))
      .catch(() => setSyncStatus('⚠ 저장 실패', 'err'));
  }, 800);
}

async function loadFromSheet() {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_SCRIPT_URL') return;
  setSyncStatus('불러오는 중…', 'ing');
  try {
    const res = await fetch(SCRIPT_URL + '?action=get&t=' + Date.now());
    const data = await res.json();
    if (data.meals) {
      Object.keys(data.meals).forEach(k => { meals[k] = data.meals[k]; });
      localStorage.setItem('meals2', JSON.stringify(meals));
    }
    if (data.favorites) {
      favorites = data.favorites;
      localStorage.setItem('favorites', JSON.stringify(favorites));
    }
    setSyncStatus('✓ 동기화됨', 'ok');
    renderCal();
    renderFavorites();
    if (selKey) {
      const [y,m,d] = selKey.split('-').map(Number);
      selDay(y, m-1, d, selKey);
    }
  } catch(e) {
    setSyncStatus('오프라인 모드', 'err');
  }
}

// ══ CALENDAR ══
function renderCal() {
  const yr=curDate.getFullYear(), mo=curDate.getMonth();
  document.getElementById('cal-title').textContent=`${yr}년 ${mo+1}월`;
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  const fd=new Date(yr,mo,1).getDay(), days=new Date(yr,mo+1,0).getDate();
  const td=new Date();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cc empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const key=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(fd+d-1)%7;
    const cc=document.createElement('div');
    cc.className='cc'+(dow===0?' sun':'')+(dow===6?' sat':'')+
      (yr===td.getFullYear()&&mo===td.getMonth()&&d===td.getDate()?' today':'')+
      (key===selKey?' sel':'');
    const sp=document.createElement('span');sp.textContent=d;cc.appendChild(sp);
    const m=meals[key];
    if(m&&(gt(m.breakfast)||gt(m.lunch)||gt(m.dinner))){
      cc.classList.add('has-meal');
      const dots=document.createElement('div');dots.className='mdots';
      if(gt(m.breakfast))dots.innerHTML+='<div class="md md-b"></div>';
      if(gt(m.lunch))    dots.innerHTML+='<div class="md md-l"></div>';
      if(gt(m.dinner))   dots.innerHTML+='<div class="md md-d"></div>';
      cc.appendChild(dots);
    }
    cc.onclick=()=>selDay(yr,mo,d,key);
    grid.appendChild(cc);
  }
}
function gt(s){if(!s)return'';return typeof s==='string'?s:(s.type==='out'?s.place:s.text);}
function changeMonth(dir){curDate.setMonth(curDate.getMonth()+dir);renderCal();}

function selDay(yr,mo,d,key){
  selKey=key; renderCal();
  const dp=document.getElementById('dp');
  dp.style.display='block';
  const ns=['일','월','화','수','목','금','토'];
  document.getElementById('dp-title').textContent=`${mo+1}월 ${d}일 (${ns[new Date(yr,mo,d).getDay()]}) 식단`;
  const sv=meals[key]||{};
  ['breakfast','lunch','dinner'].forEach(sl=>{
    const v=sv[sl]||{type:'home',text:'',homeUrl:'',place:'',url:''};
    mst[sl]={type:v.type||'home',text:v.text||'',homeUrl:v.homeUrl||'',place:v.place||'',url:v.url||''};
    applyType(sl,mst[sl].type);
    document.getElementById(`txt-${sl}`).value=v.text||'';
    document.getElementById(`pl-${sl}`).value=v.place||'';
    document.getElementById(`url-${sl}`).value=v.url||'';
    updOpen(sl,v.url||'');
    // URL 토글 상태 복원
    const urlRow=document.getElementById(`home-url-row-${sl}`);
    const urlToggle=document.getElementById(`home-url-toggle-${sl}`);
    document.getElementById(`home-url-${sl}`).value=v.homeUrl||'';
    updHomeOpen(sl,v.homeUrl||'');
    if(urlRow&&urlToggle){
      if(v.homeUrl){
        urlRow.style.display=''; urlToggle.textContent='🔗 링크 접기';
      } else {
        urlRow.style.display='none'; urlToggle.textContent='🔗 링크 추가';
      }
    }
  });
  // 모바일: day panel로 스크롤
  if(window.innerWidth<=768){
    setTimeout(()=>dp.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
  }
}

function applyType(sl,type){
  document.getElementById(`home-${sl}`).style.display=type==='home'?'':'none';
  document.getElementById(`out-${sl}`).style.display=type==='out'?'':'none';
  const blk=document.getElementById(`blk-${sl}`);
  blk.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',(i===0&&type==='home')||(i===1&&type==='out')));
  mst[sl].type=type;
}
function setType(sl,type){applyType(sl,type);}

function updOpen(sl,url){
  const a=document.getElementById(`opn-${sl}`);
  if(!a)return;
  const ok=url&&url.startsWith('http');
  a.href=ok?url:'#'; a.style.opacity=ok?'1':'.4'; a.style.pointerEvents=ok?'auto':'none';
}
function updHomeOpen(sl,url){
  const a=document.getElementById(`home-opn-${sl}`);
  if(!a)return;
  const ok=url&&url.startsWith('http');
  a.href=ok?url:'#'; a.style.opacity=ok?'1':'.4'; a.style.pointerEvents=ok?'auto':'none';
}
function toggleHomeUrl(sl){
  const row=document.getElementById(`home-url-row-${sl}`);
  const btn=document.getElementById(`home-url-toggle-${sl}`);
  const vis=row.style.display!=='none';
  row.style.display=vis?'none':'';
  btn.textContent=vis?'🔗 링크 추가':'🔗 링크 접기';
  if(!vis) setTimeout(()=>document.getElementById(`home-url-${sl}`).focus(),50);
}
function smap(sl,svc){
  const nm=document.getElementById(`pl-${sl}`).value.trim();
  if(!nm){toast('음식점 이름을 먼저 입력해 주세요 🏠');return;}
  const q=encodeURIComponent(nm);
  const u={naver:`https://map.naver.com/v5/search/${q}`,kakao:`https://map.kakao.com/?q=${q}`,google:`https://www.google.com/maps/search/${q}`};
  window.open(u[svc],'_blank');
}
function saveMeal(){
  if(!selKey)return;
  const d={};
  ['breakfast','lunch','dinner'].forEach(sl=>{
    const type=mst[sl].type;
    const text=document.getElementById(`txt-${sl}`).value.trim();
    const homeUrl=document.getElementById(`home-url-${sl}`).value.trim();
    const place=document.getElementById(`pl-${sl}`).value.trim();
    const url=document.getElementById(`url-${sl}`).value.trim();
    if(type==='home'&&text) d[sl]={type:'home',text,homeUrl,place:'',url:''};
    else if(type==='out'&&place) d[sl]={type:'out',text:'',homeUrl:'',place,url};
    else d[sl]=null;
  });
  if(Object.values(d).some(Boolean)) meals[selKey]=d;
  else delete meals[selKey];
  saveM(); renderCal(); toast('저장했어요! ✅');
}
function qs(sl){
  const v=document.getElementById(`txt-${sl}`).value.trim();
  if(v) document.getElementById('sq').value=v;
  document.getElementById('sq').focus();
  document.getElementById('sq').scrollIntoView({behavior:'smooth',block:'center'});
}

// ══ SEARCH ══
const PLATFORMS=[
  {key:'recipe', icon:'🍲', label:'만개의레시피', sub:'요리 전문 사이트', url:q=>`https://www.10000recipe.com/recipe/list.html?q=${q}`},
  {key:'youtube',icon:'▶️', label:'유튜브',       sub:'영상 레시피',     url:q=>`https://www.youtube.com/results?search_query=${q}`},
  {key:'web',    icon:'🔍', label:'구글 검색',    sub:'전체 검색',       url:q=>`https://www.google.com/search?q=${q}`},
];
function doSearch(){
  const raw=document.getElementById('sq').value.trim();
  if(!raw){toast('검색어를 입력해 주세요 🔍');return;}
  const q=encodeURIComponent(raw+' 레시피');
  const wrap=document.getElementById('results-wrap');
  const list=document.getElementById('results-list');
  document.getElementById('results-label').textContent=`"${raw} 레시피" 검색 결과`;
  list.innerHTML='';
  PLATFORMS.forEach(p=>{
    const url=p.url(q);
    const div=document.createElement('div');div.className='result-item';
    div.innerHTML=`
      <div class="ri-icon">${p.icon}</div>
      <div class="ri-info">
        <div class="ri-name">${p.label} — <span style="font-weight:500">${escH(raw)} 레시피</span></div>
        <div class="ri-url">${p.sub}</div>
      </div>
      <div class="ri-btns">
        <a class="ri-open" href="${url}" target="_blank">열기 ↗</a>
        <button class="ri-save" onclick="saveFromResult('${p.label}에서 ${escH(raw)} 레시피','${url}','${p.key}')">★ 저장</button>
      </div>`;
    list.appendChild(div);
  });
  wrap.style.display='';
  wrap.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ══ LINK UTILS ══
function detectPlatform(url){
  if(/youtube\.com|youtu\.be/.test(url)) return 'youtube';
  if(/instagram\.com/.test(url)) return 'instagram';
  if(/naver\.com/.test(url)) return 'naver';
  if(/tiktok\.com/.test(url)) return 'tiktok';
  if(/10000recipe|haemukja|mangchi|cookingna/.test(url)) return 'recipe';
  return 'web';
}
const PL_ICONS={youtube:'▶️',instagram:'📸',naver:'📗',tiktok:'🎵',recipe:'🍳',web:'🔗'};
const PL_NAMES={youtube:'유튜브',instagram:'인스타',naver:'네이버',tiktok:'틱톡',recipe:'레시피',web:'웹'};
function getYTThumb(url){
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
  return m?`https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`:null;
}

// ══ FAVORITES ══
let pasteGroup='toTry';
function setPasteGroup(g,btn){
  pasteGroup=g;
  document.querySelectorAll('.pg-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function saveFavorite(title,url,platform,group){
  group=group||'toTry';
  platform=platform||detectPlatform(url);
  favorites.unshift({id:Date.now(),title,url,platform,group,date:new Date().toLocaleDateString('ko-KR')});
  if(favorites.length>200) favorites=favorites.slice(0,200);
  saveFavs(); renderFavorites();
}
function saveFromResult(title,url,platform){
  saveFavorite(title,url,platform,'toTry');
  toast('📌 인증할 레시피에 저장됐어요!');
}
function pasteAndSave(){
  const url=document.getElementById('paste-url').value.trim();
  if(!url){toast('URL을 붙여넣어 주세요');return;}
  if(!url.startsWith('http')){toast('올바른 URL을 입력해 주세요 (http로 시작)');return;}
  const pl=detectPlatform(url);
  let title=document.getElementById('paste-title').value.trim();
  if(!title){
    try{title=`${PL_NAMES[pl]||new URL(url).hostname.replace('www.','')} 레시피`;}
    catch(e){title=`${PL_NAMES[pl]||'웹'} 레시피`;}
  }
  saveFavorite(title,url,pl,pasteGroup);
  document.getElementById('paste-url').value='';
  document.getElementById('paste-title').value='';
  toast(pasteGroup==='verified'?'✅ 인증된 레시피에 저장됐어요!':'📌 인증할 레시피에 저장됐어요!');
}
function moveFav(id){
  const fav=favorites.find(f=>f.id===id);
  if(!fav)return;
  fav.group=fav.group==='toTry'?'verified':'toTry';
  saveFavs(); renderFavorites();
  toast(fav.group==='verified'?'✅ 인증된 레시피로 이동했어요!':'📌 인증할 레시피로 이동했어요!');
}
function delFav(id){
  favorites=favorites.filter(f=>f.id!==id);
  saveFavs(); renderFavorites();
}
let favTab='toTry';
function setFavTab(group,btn){
  favTab=group;
  document.querySelectorAll('.fav-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderFavorites();
}
function renderFavorites(){
  const el=document.getElementById('fav-list');
  const list=favorites.filter(f=>f.group===favTab);
  const total=favorites.length;
  document.getElementById('fav-count').textContent=total?`(${total}개)`:'';
  if(!list.length){
    el.innerHTML=`<div class="saved-empty">${favTab==='toTry'?'아직 없어요<br>검색 후 ★ 저장을 눌러 추가하세요':'아직 없어요<br>인증할 레시피에서 ✅ 인증됨을 눌러 옮기세요'}</div>`;
    return;
  }
  el.innerHTML='';
  const ul=document.createElement('div');ul.className='saved-list';
  list.forEach(fav=>{
    const thumb=fav.platform==='youtube'?getYTThumb(fav.url):null;
    const thumbHtml=thumb
      ?`<div class="sl-thumb"><img src="${thumb}" onerror="this.parentElement.textContent='${PL_ICONS[fav.platform]||'🔗'}'"></div>`
      :`<div class="sl-thumb">${PL_ICONS[fav.platform]||'🔗'}</div>`;
    const moveLabel=favTab==='toTry'?'✅ 인증됨':'📌 나중에';
    const item=document.createElement('div');item.className='sl-item';
    item.innerHTML=`
      ${thumbHtml}
      <div class="sl-info">
        <div class="sl-title">${escH(fav.title)}</div>
        <div class="sl-url">${escH(fav.url)}</div>
        <div class="sl-meta">
          <span class="pl-badge pl-${fav.platform}">${PL_NAMES[fav.platform]||'웹'}</span>
          <span class="sl-date">${fav.date}</span>
        </div>
      </div>
      <div class="sl-btns">
        <a class="sl-open" href="${escH(fav.url)}" target="_blank">열기 ↗</a>
        <button class="sl-add" onclick="moveFav(${fav.id})">${moveLabel}</button>
        <button class="sl-del" onclick="delFav(${fav.id})">삭제</button>
      </div>`;
    ul.appendChild(item);
  });
  el.appendChild(ul);
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══ DAILY RECIPES ══
function seededShuffle(arr,seed){
  const a=[...arr]; let s=seed>>>0;
  function rng(){s=Math.imul(s^s>>>16,0x45d9f3b);s=Math.imul(s^s>>>16,0x45d9f3b);return((s^s>>>16)>>>0)/4294967296;}
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function getDailyOrder(){
  const d=new Date();
  const seed=parseInt(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
  return seededShuffle([...RECIPE_POOL],seed);
}
function shuffleRecs(){recsOffset=(recsOffset+6)%RECIPE_POOL.length;renderRecs();}
function renderRecs(){
  const el=document.getElementById('recs-list');if(!el)return;
  const daily=getDailyOrder();
  el.innerHTML='';
  for(let i=0;i<6;i++){
    const r=daily[(recsOffset+i)%daily.length];
    const div=document.createElement('div');div.className='rec-item';
    div.innerHTML=`
      <span class="rec-emoji">${r.emoji}</span>
      <div class="rec-info">
        <div class="rec-name">${escH(r.name)}</div>
        <span class="rec-cat-badge">${r.cat}</span>
      </div>
      <div class="rec-actions">
        <a class="rec-open" href="https://www.10000recipe.com/recipe/${r.id}" target="_blank">레시피 ↗</a>
        <button class="rec-add" onclick="addToMeal('${r.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">＋ 식단</button>
      </div>`;
    el.appendChild(div);
  }
}
function addToMeal(name){
  if(!selKey){toast('달력에서 날짜를 먼저 선택해 주세요 📅');return;}
  const m=meals[selKey]||{};
  const slot=!gt(m.breakfast)?'breakfast':!gt(m.lunch)?'lunch':!gt(m.dinner)?'dinner':'lunch';
  m[slot]={type:'home',text:name,homeUrl:'',place:'',url:''};
  meals[selKey]=m; saveM(); renderCal();
  if(document.getElementById('dp').style.display!=='none'){
    applyType(slot,'home');
    document.getElementById(`txt-${slot}`).value=name;
    document.getElementById(`home-url-${slot}`).value='';
    updHomeOpen(slot,'');
    const urlRow=document.getElementById(`home-url-row-${slot}`);
    const urlToggle=document.getElementById(`home-url-toggle-${slot}`);
    if(urlRow&&urlToggle){urlRow.style.display='none';urlToggle.textContent='🔗 링크 추가';}
  }
  toast(`${name} 식단에 추가됐어요 🎉`);
}

// ══ TOAST ══
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ INIT ══
renderCal(); renderRecs(); renderFavorites();
const now=new Date();
const tk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
selDay(now.getFullYear(),now.getMonth(),now.getDate(),tk);
// 구글 시트에서 최신 데이터 로드 + 2분마다 자동 갱신
loadFromSheet();
setInterval(loadFromSheet, 2*60*1000);
</script>
